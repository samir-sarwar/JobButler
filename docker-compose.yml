version: '3.9'

services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/jobbutler
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-oss-120b}
      - PDF_BACKEND=docker
      - DOCKER_LATEX_URL=http://latex-sidecar:3002/compile
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-http://localhost:5173}
    depends_on:
      - mongo
      - latex-sidecar
    restart: unless-stopped

  latex-sidecar:
    build: ./docker/texlive-sidecar
    ports:
      - "3002:3002"
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mongo_data:
